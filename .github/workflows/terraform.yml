name: Terraform

on:
  push:
    branches: [ '**' ]

jobs:
  validate:
    uses: sil-org/workflows/.github/workflows/terraform.yml@main
    with:
      # validate with the earliest version allowed by required_version in versions.tf
      terraform-version: '~> 1.0'

  test:
    name: 'Terraform'
    runs-on: ubuntu-latest

    steps:
      # Install Terraform 1.7, which is the earliest that supports `terraform test`.
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.7.5"

      # Test
      - name: Terraform Test
        run: terraform test -verbose
